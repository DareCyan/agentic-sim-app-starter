syntax = "proto3";

package scrcpy;

message Empty {}

message ParamValue {
  oneof value {
    int32 int_val = 1;
    int64 long_val = 2;
    float float_val = 3;
    double double_val = 4;
    string string_val = 5;
    bool bool_val = 6;
  }
}

message ReplyMessage {
  map<string, ParamValue> data = 1;
}

message ReplyEndMessage {
  int32 code = 1;
}

service ScrcpyService {
  rpc onStart(Empty) returns (stream ReplyMessage);
  rpc onEnd(Empty) returns (ReplyEndMessage);
  rpc onRequestIDRFrame(Empty) returns (ReplyEndMessage);
}
